# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Hybrid ranker combining dense semantic retrieval with rule-based multi-component scoring. 
  An offline precompute phase (Steps 1.1–1.7) ingests the 100K candidate pool, deduplicates 
  embedding text, builds a FAISS IndexFlatIP over BAAI/bge-base-en-v1.5 embeddings, 
  and precomputes disqualifier flags and honeypot detection. At runtime, the JD is 
  embedded using the same model and used for FAISS top-1500 retrieval. Candidates are 
  then scored across four components: semantic similarity (38%), hard-skill coverage against 
  JD required/nice-to-have skills (30%), experience and seniority fit via a trapezoid function 
  (17%), and a behavioral signal aggregate (15%). The 23 redrob_signals are bucketed into 
  consistency, engagement, growth, integrity, and culture-fit, producing a multiplicative 
  modifier in [0.55, 1.25] applied to the raw score. Hard honeypot filters exclude logically 
  impossible profiles (expert skill with 0 months usage, impossible education dates, certs 
  predating technology existence). Soft contradictions apply graduated score penalties 
  rather than exclusion. Per-candidate reasoning is generated deterministically from matched 
  skills, experience delta, and the strongest behavioral bucket. Runtime is well under 5 minutes 
  on CPU for 100K candidates.



